name: Terraform + Docker Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # Give EC2/ASG a bit of time to come up and register with SSM
      - name: Wait for EC2 + SSM
        run: |
          echo "Waiting 120 seconds for instances to become SSM online..."
          sleep 200

      - name: Deploy chatbot with Docker via SSM (Ubuntu)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy chatbot Docker container on Ubuntu instances" \
            --targets "Key=tag:Name,Values=ai-chatbot-ec2" \
            --parameters 'commands=[
              "set -xe",
              "echo ==== BEGIN CHATBOT DOCKER DEPLOY ====",
              "uname -a",
              "whoami",
              "echo Updating apt...",
              "sudo apt-get update -y",
              "echo Installing Docker and git...",
              "sudo apt-get install -y docker.io git",
              "sudo systemctl enable docker || true",
              "sudo systemctl start docker || true",
              "cd /home/ubuntu",
              "if [ ! -d cloud-computing-chatbot ]; then git clone https://github.com/Terabyite/cloud-computing-chatbot.git; fi",
              "cd cloud-computing-chatbot",
              "git pull",
              "echo Building Docker image...",
              "sudo docker rm -f chatbot || true",
              "sudo docker build -t chatbot:latest .",
              "echo Running Docker container on port 8080...",
              "sudo docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest",
              "echo Checking container status...",
              "sudo docker ps",
              "echo Testing http://localhost:8080/",
              "curl -v http://localhost:8080/ || true",
              "echo ==== END CHATBOT DOCKER DEPLOY ===="
            ]' \
            --timeout-seconds 600 \
            --output text
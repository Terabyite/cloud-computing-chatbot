name: Terraform + Docker Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # IMPORTANT: this assumes:
      # - Instances are Ubuntu
      # - ASG tags instances with Name = "${var.project}-ec2" (ai-chatbot-ec2)
      - name: Deploy chatbot with Docker via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy chatbot Docker on Ubuntu" \
            --targets "Key=tag:Name,Values=ai-chatbot-ec2" \
            --parameters '{
              "commands": [
                "set -xe",
                "echo === Installing Docker & Git on Ubuntu ===",
                "if ! command -v docker >/dev/null 2>&1; then",
                "  apt-get update -y && apt-get install -y docker.io git",
                "  systemctl enable docker || true",
                "  systemctl start docker || true",
                "fi",
                "echo === Cloning chatbot repo ===",
                "cd /home/ubuntu",
                "if [ ! -d cloud-computing-chatbot ]; then",
                "  git clone https://github.com/Terabyite/cloud-computing-chatbot.git",
                "fi",
                "cd cloud-computing-chatbot",
                "git pull",
                "echo === Building Docker image ===",
                "docker rm -f chatbot || true",
                "docker build -t chatbot:latest .",
                "echo === Running container on port 8080 ===",
                "docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest",
                "echo === Done. Check with: docker ps && curl -v http://localhost:8080/ ==="
              ]
            }'
name: Terraform + Docker Deploy

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_NAME: "ai-chatbot"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # Give the ASG some time to launch instances & SSM agent to come online
      - name: Wait for EC2 instances to boot
        run: sleep 300

      - name: Deploy chatbot with Docker via SSM (Ubuntu + correct repo)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Install Docker and run chatbot container on Ubuntu" \
            --targets "Key=tag:Name,Values=ai-chatbot-ec2" \
            --parameters '{
              "commands": [
                "set -xe",
                "whoami",
                "echo Running on $(hostname)",
                "apt-get update -y",
                "apt-get install -y docker.io git",
                "systemctl enable docker || true",
                "systemctl start docker || true",
                "cd /home/ubuntu",
                "if [ ! -d cloud-computing-chatbot ]; then git clone https://github.com/Terabyite/cloud-computing-chatbot.git; fi",
                "cd cloud-computing-chatbot",
                "git pull",
                "docker rm -f chatbot || true",
                "docker build -t chatbot:latest .",
                "docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest",
                "docker ps",
                "ss -ltnp | grep 8080 || echo 'No process on 8080 yet'",
                "curl -v http://localhost:8080/ || true"
              ]
            }' \
            --timeout-seconds 900
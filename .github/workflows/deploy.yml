name: Terraform + Docker Deploy (Ubuntu)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: terraform
      EC2_TAG_NAME: ai-chatbot-ec2   # This must match the Name tag in your ASG/launch template
      CHATBOT_REPO_URL: https://github.com/Terabyite/-Chatbot-On-AWS-EC2.git

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      # Wait until at least ONE instance with tag Name=ai-chatbot-ec2 is online in SSM
      - name: Wait for SSM-managed instances
        run: |
          set -e
          for i in {1..30}; do
            COUNT=$(aws ssm describe-instance-information \
              --filters "Key=tag:Name,Values=${EC2_TAG_NAME}" \
              --query "InstanceInformationList | length(@)" \
              --output text)
            echo "SSM instances with tag Name=${EC2_TAG_NAME}: $COUNT"
            if [ "$COUNT" -ge 1 ]; then
              echo "At least one instance is online in SSM."
              break
            fi
            echo "Waiting for instances to come online in SSM (attempt $i/30)..."
            sleep 20
          done

      - name: Deploy chatbot with Docker via SSM (Ubuntu)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy chatbot docker container" \
            --targets "Key=tag:Name,Values=${EC2_TAG_NAME}" \
            --parameters 'commands=[
              "set -xe",
              "sudo apt-get update -y",
              "sudo apt-get install -y docker.io git",
              "sudo systemctl enable docker",
              "sudo systemctl start docker",
              "cd /home/ubuntu",
              "if [ ! -d chatbot ]; then git clone '"${CHATBOT_REPO_URL}"' chatbot; fi",
              "cd chatbot",
              "git pull",
              "sudo docker rm -f chatbot || true",
              "sudo docker build -t chatbot:latest .",
              "sudo docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest"
            ]'
name: Build Docker, Upload to S3, Terraform Apply, Deploy via SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ai-chatbot
  IMAGE_TAG: latest
  TAR_PREFIX: ai-chatbot-image
  SSM_TARGET_KEY: "tag:ManagedBy"
  SSM_TARGET_VALUE: "github-actions"
  TF_DIR: terraform

permissions:
  contents: read

jobs:
  build-save-upload:
    name: Build Docker image and upload to S3
    runs-on: ubuntu-latest
    outputs:
      s3_key: ${{ steps.upload.outputs.s3_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Save image to tar.gz
        id: save
        run: |
          COMMIT=${GITHUB_SHA::8}
          TAR_FILE="${TAR_PREFIX}-${COMMIT}.tar.gz"
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" | gzip > "${TAR_FILE}"
          echo "tarfile=${TAR_FILE}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload tar to S3
        id: upload
        run: |
          if [ -z "${{ secrets.S3_BUCKET }}" ]; then
            echo "Set repo secret S3_BUCKET to the bucket name (e.g. terabbyte-terraform-state)"
            exit 1
          fi
          TAR_FILE="${{ steps.save.outputs.tarfile }}"
          KEY="docker-images/${TAR_FILE}"
          aws s3 cp "${TAR_FILE}" "s3://${{ secrets.S3_BUCKET }}/${KEY}" --only-show-errors
          echo "::set-output name=s3_key::${KEY}"

  terraform-apply:
    name: Terraform Init & Apply
    needs: build-save-upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_key_name: ${{ secrets.TF_VAR_key_name || "" }}
          TF_VAR_project: ${{ secrets.TF_VAR_project || "" }}
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET || "" }}
        run: terraform apply -auto-approve -input=false

  deploy-ssm:
    name: Deploy to EC2 via SSM
    needs: terraform-apply
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create SSM deploy script and params JSON
        id: create_ssm_files
        run: |
          set -euxo pipefail

          S3_BUCKET="${{ secrets.S3_BUCKET }}"
          S3_KEY="${{ needs.build-save-upload.outputs.s3_key }}"
          TAR="/tmp/$(basename ${S3_KEY})"
          CONTAINER_NAME="${IMAGE_NAME}"
          IMAGE_NAME="${IMAGE_NAME}:latest"

          # SSM script executed on EC2 instances
          cat > deploy-script.sh <<'SSM_SCRIPT'
#!/bin/bash
set -xe

S3_BUCKET="{{S3_BUCKET}}"
S3_KEY="{{S3_KEY}}"
TAR="/tmp/$(basename ${S3_KEY})"
CONTAINER_NAME="{{CONTAINER_NAME}}"
IMAGE_NAME="{{IMAGE_NAME}}"

# If apt-based (Ubuntu), install docker if missing
if command -v apt-get >/dev/null 2>&1; then
  if ! command -v docker >/dev/null 2>&1; then
    apt-get update -y
    apt-get install -y ca-certificates curl gnupg lsb-release
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
      > /etc/apt/sources.list.d/docker.list
    apt-get update -y
    apt-get install -y docker-ce docker-ce-cli containerd.io
    systemctl enable --now docker || true
  fi
fi

# Ensure aws cli exists (should in AMIs GitHub Actions uses; install if missing)
if ! command -v aws >/dev/null 2>&1; then
  apt-get update -y || true
  apt-get install -y awscli || true
fi

# Download tar from S3 (needs instance role with s3:GetObject)
aws s3 cp "s3://${S3_BUCKET}/${S3_KEY}" "${TAR}"

# Load docker image & run
docker load -i "${TAR}"
docker rm -f "${CONTAINER_NAME}" || true
docker run -d --name "${CONTAINER_NAME}" --restart unless-stopped -p 8080:8080 "${IMAGE_NAME}"
SSM_SCRIPT

          # replace placeholders with real values (safe substitution)
          sed -e "s|{{S3_BUCKET}}|${S3_BUCKET}|g" \
              -e "s|{{S3_KEY}}|${S3_KEY}|g" \
              -e "s|{{CONTAINER_NAME}}|${CONTAINER_NAME}|g" \
              -e "s|{{IMAGE_NAME}}|${IMAGE_NAME}|g" \
              deploy-script.sh > /tmp/deploy-script-final.sh

          chmod +x /tmp/deploy-script-final.sh

          # prepare params.json for aws cli (commands is an array of script lines)
          # We will read the script and split into lines for JSON array
          python3 - <<PY
import json,sys
script = open('/tmp/deploy-script-final.sh','r').read().splitlines()
# ensure first element is bash shebang, provide as command array
params = {"commands": script}
open('/tmp/params.json','w').write(json.dumps(params))
print('WROTE /tmp/params.json')
PY

      - name: Send SSM command to instances
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ai-chatbot from S3" \
            --targets "Key=${{ env.SSM_TARGET_KEY }},Values=${{ env.SSM_TARGET_VALUE }}" \
            --parameters file:///tmp/params.json \
            --timeout-seconds 600 \
            --output json

      - name: Wait a bit (optional)
        run: sleep 15
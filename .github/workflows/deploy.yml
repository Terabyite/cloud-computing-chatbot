name: Terraform + Docker Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # === Deploy chatbot Docker container on Ubuntu EC2 via SSM ===
      - name: Deploy chatbot with Docker via SSM (Ubuntu)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy chatbot Docker on Ubuntu EC2" \
            --targets "Key=tag:Name,Values=ai-chatbot-ec2" \
            --parameters 'commands=[
              "set -xe",
              "echo === Starting chatbot Docker deployment on Ubuntu ===",
              "whoami",
              "uname -a",

              "sudo apt-get update -y",
              "sudo apt-get install -y docker.io git",

              "sudo systemctl enable docker || true",
              "sudo systemctl start docker || true",

              "cd /home/ubuntu",

              "if [ ! -d chatbot ]; then git clone https://github.com/Terabyite/cloud-computing-chatbot.git chatbot; fi",
              "cd chatbot",
              "git pull",

              "sudo docker rm -f chatbot || true",
              "sudo docker build -t chatbot:latest .",
              "sudo docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest",

              "echo === Docker deployment finished ===",
              "sudo docker ps",
              "ss -ltnp | grep 8080 || echo no-listen-8080"
            ]' \
            --timeout-seconds 900
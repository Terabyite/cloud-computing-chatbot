name: Terraform + Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Deploy chatbot with Docker via SSM (Ubuntu)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Install Docker and run chatbot container" \
            --targets "Key=tag:Name,Values=ai-chatbot-ec2" \
            --parameters '{"commands":["set -xe","sudo apt-get update -y","sudo apt-get install -y docker.io git","sudo systemctl enable docker || true","sudo systemctl start docker || true","cd /home/ubuntu","if [ ! -d cloud-computing-chatbot ]; then git clone https://github.com/Terabyite/cloud-computing-chatbot.git; fi","cd cloud-computing-chatbot","git pull","sudo docker rm -f chatbot || true","sudo docker build -t chatbot:latest .","sudo docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest","sudo docker ps","sudo ss -ltnp | grep 8080 || echo no_8080","curl -v http://localhost:8080/ || true"]}' \
            --timeout-seconds 900
name: CI - Build Docker, Terraform Apply, Deploy to EC2 via SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # change these if you like
  IMAGE_NAME: ai-chatbot
  IMAGE_TAG: latest
  TAR_PREFIX: ai-chatbot-image
  TF_DIR: terraform
  # SSM target tag (instances must have this tag key/value)
  SSM_TARGET_TAG: ManagedBy
  SSM_TARGET_VALUE: github-actions
  # Timeout for SSM command polling (seconds)
  SSM_TIMEOUT: 600

permissions:
  contents: read

jobs:
  build_and_upload:
    name: Build Docker image → Save → Upload to S3
    runs-on: ubuntu-latest
    outputs:
      s3_key: ${{ steps.upload.outputs.s3_key }}
      tarfile: ${{ steps.save.outputs.tarfile }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Save image to tar.gz
        id: save
        run: |
          set -eux
          COMMIT=${GITHUB_SHA::8}
          TAR_FILE="${TAR_PREFIX}-${COMMIT}.tar.gz"
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" | gzip > "${TAR_FILE}"
          echo "tarfile=${TAR_FILE}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload tar to S3
        id: upload
        run: |
          set -eux
          if [ -z "${{ secrets.S3_BUCKET }}" ]; then
            echo "Error: set repository secret S3_BUCKET to the bucket name (e.g. terabbyte-terraform-state)"
            exit 1
          fi
          TAR_FILE="${{ steps.save.outputs.tarfile }}"
          KEY="docker-images/${TAR_FILE}"
          aws s3 cp "${TAR_FILE}" "s3://${{ secrets.S3_BUCKET }}/${KEY}" --only-show-errors
          echo "s3_key=${KEY}" >> $GITHUB_OUTPUT

  terraform_apply:
    name: Terraform Init & Apply
    runs-on: ubuntu-latest
    needs: build_and_upload
    outputs:
      s3_key: ${{ needs.build_and_upload.outputs.s3_key }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform apply (auto-approve)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_key_name: ${{ secrets.TF_VAR_key_name || "" }}
          TF_VAR_project: ${{ secrets.TF_VAR_project || "" }}
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET || "" }}
        run: terraform apply -auto-approve -input=false

  deploy_via_ssm:
    name: Deploy image on EC2 via SSM
    runs-on: ubuntu-latest
    needs: terraform_apply
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create SSM deploy script and params.json (Python, safe)
        id: make_script
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_KEY: ${{ needs.build_and_upload.outputs.s3_key }}
          CONTAINER_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_NAME_FULL: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          set -euxo pipefail
          python3 - <<'PY'
import os, json, textwrap
s3_bucket = os.environ['S3_BUCKET']
s3_key = os.environ['S3_KEY']
container_name = os.environ['CONTAINER_NAME']
image_name = os.environ['IMAGE_NAME_FULL']

script = textwrap.dedent(f"""\
#!/bin/bash
set -xe

S3_BUCKET="{s3_bucket}"
S3_KEY="{s3_key}"
TAR_FILE="/tmp/$(basename ${S3_KEY})"
CONTAINER_NAME="{container_name}"
IMAGE_NAME="{image_name}"

# Install docker if not present (supports apt/apt-get - Ubuntu/Debian)
if command -v docker >/dev/null 2>&1; then
  echo "docker present"
else
  if command -v apt-get >/dev/null 2>&1; then
    apt-get update -y
    apt-get install -y ca-certificates curl gnupg lsb-release
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
    apt-get update -y
    apt-get install -y docker-ce docker-ce-cli containerd.io
    systemctl enable --now docker || true
  else
    # attempt yum for Amazon Linux / RHEL
    if command -v yum >/dev/null 2>&1; then
      yum install -y docker git
      systemctl enable --now docker || true
    fi
  fi
fi

# Ensure aws cli present
if ! command -v aws >/dev/null 2>&1; then
  if command -v apt-get >/dev/null 2>&1; then
    apt-get install -y awscli || true
  elif command -v yum >/dev/null 2>&1; then
    yum install -y awscli || true
  fi
fi

# Download image tar from S3
aws s3 cp "s3://${S3_BUCKET}/${S3_KEY}" "${TAR_FILE}"

# Load and run
docker load -i "${TAR_FILE}"
docker rm -f "${CONTAINER_NAME}" || true
docker run -d --name "${CONTAINER_NAME}" --restart unless-stopped -p 8080:8080 "${IMAGE_NAME}"
""")

open('/tmp/deploy-script-final.sh','w').write(script)
os.chmod('/tmp/deploy-script-final.sh',0o755)
# write params.json as SSM expects {"commands": [ "line1", ... ]}
lines = script.splitlines()
open('/tmp/params.json','w').write(json.dumps({"commands": lines}))
print("WROTE /tmp/deploy-script-final.sh and /tmp/params.json")
PY

      - name: Send SSM command (targets by tag)
        id: send_cmd
        run: |
          set -eux
          TARGET_KEY="${{ env.SSM_TARGET_TAG }}"
          TARGET_VALUE="${{ env.SSM_TARGET_VALUE }}"
          CMD_OUT=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ai-chatbot (docker image) from S3" \
            --targets "Key=${TARGET_KEY},Values=${TARGET_VALUE}" \
            --parameters file:///tmp/params.json \
            --timeout-seconds 600 \
            --output json)
          echo "${CMD_OUT}" > /tmp/sendcmd.json
          COMMAND_ID=$(jq -r '.Command.CommandId' /tmp/sendcmd.json)
          echo "command_id=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "command_id=${COMMAND_ID}" > /tmp/command_id.txt

      - name: Poll SSM command until finished (or timeout)
        env:
          CMD_ID: ${{ steps.send_cmd.outputs.command_id }}
          SSM_TIMEOUT: ${{ env.SSM_TIMEOUT }}
          TARGET_KEY: ${{ env.SSM_TARGET_TAG }}
          TARGET_VALUE: ${{ env.SSM_TARGET_VALUE }}
        run: |
          set -eux
          CMD_ID=$(cat /tmp/command_id.txt)
          DEADLINE=$((SECONDS + SSM_TIMEOUT))
          echo "Waiting for command ${CMD_ID} to finish (timeout ${SSM_TIMEOUT}s)..."
          while [ $SECONDS -lt $DEADLINE ]; do
            aws ssm list-command-invocations --command-id "$CMD_ID" --details --output json > /tmp/invocations.json
            # check statuses. if all are Success or at least one Success and none InProgress/Delayed then break.
            STATUSES=$(jq -r '.CommandInvocations[].Status' /tmp/invocations.json || echo "")
            echo "Current statuses: $STATUSES"
            if [ -z "$STATUSES" ]; then
              sleep 5
              continue
            fi
            # If any in progress/delayed/pending then wait
            if echo "$STATUSES" | grep -E "(InProgress|Pending|Delayed)" >/dev/null; then
              sleep 5
              continue
            fi
            # If any Failed or Cancelled then exit with error
            if echo "$STATUSES" | grep -E "(Failed|Cancelled|TimedOut|Undeliverable)" >/dev/null; then
              echo "One or more invocations failed. Dumping invocations.json"
              cat /tmp/invocations.json
              exit 1
            fi
            # Otherwise, success
            echo "SSM command finished successfully."
            cat /tmp/invocations.json
            exit 0
          done
          echo "Timeout waiting for SSM command ${CMD_ID}"
          aws ssm list-command-invocations --command-id "$CMD_ID" --details --output json || true
          exit 2
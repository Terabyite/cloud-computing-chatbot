name: Terraform + Docker Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false

      - name: Deploy chatbot with Docker via SSM (target: ManagedBy=github-actions)
        env:
          SSM_TAG_KEY: ManagedBy
          SSM_TAG_VALUE: github-actions
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:${SSM_TAG_KEY},Values=${SSM_TAG_VALUE}" \
            --parameters 'commands=[
              "set -xe",
              "sudo apt-get update -y || sudo yum update -y || true",
              "if command -v docker >/dev/null 2>&1; then echo docker present; else ( \
                 if command -v apt-get >/dev/null 2>&1; then \
                   apt-get install -y ca-certificates curl gnupg lsb-release && \
                   curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg || true && \
                   echo \"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable\" > /etc/apt/sources.list.d/docker.list && \
                   apt-get update -y && apt-get install -y docker-ce docker-ce-cli containerd.io || apt-get install -y docker.io || true ; \
                 else \
                   yum install -y docker git || true ; \
                 fi ); fi",
              "sudo systemctl enable docker || true",
              "sudo systemctl start docker || true",
              "cd /home/ec2-user || cd /home/ubuntu || cd /root || true",
              "if [ ! -d chatbot ]; then git clone https://github.com/Terabyite/cloud-computing-chatbot.git chatbot; fi",
              "cd chatbot || true",
              "git pull || true",
              "sudo docker rm -f chatbot || true",
              "sudo docker build -t chatbot:latest .",
              "sudo docker run -d --name chatbot -p 8080:8080 --restart=always chatbot:latest"
            ]' \
            --timeout-seconds 600 \
            --comment "Deploy chatbot docker via SSM (ManagedBy=github-actions)"